name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Show Python version
        run: uv run python --version && uv run python -c "import sys; print(sys.executable)"

      - name: Run tests
        run: uv run pytest -v --tb=long
        env:
          NO_COLOR: "1"
